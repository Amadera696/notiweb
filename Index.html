<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notiweb - Inicio</title>
  <style>
    * {margin: 0;padding: 0;box-sizing: border-box;}
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      background: url('imagenes/fondo1.jpg');
      background-size: cover;
      overflow-x: hidden;
    }
    header {
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      transition: background 0.5s ease;
    }
    header.scrolled {
      background: rgba(0,0,0,0.9);
    }
    header nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      position: relative;
    }
    header nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0%;
      height: 2px;
      background: #ff5a5f;
      transition: width 0.3s ease;
    }
    header nav a:hover::after {
      width: 100%;
    }
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: rgba(0, 0, 0, 0.55);
      margin: 80px auto;
      width: 80%;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .hero.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .hero img {
      max-width: 350px;
      width: 100%;
      height: auto;
      margin-bottom: 30px;
      border-radius: 10px;
      transform: scale(0.9);
      transition: transform 0.8s ease;
    }
    .hero img:hover {
      transform: scale(1);
    }
    .hero h1 {font-size: 48px;margin-bottom: 20px;font-weight: bold;}
    .hero p {font-size: 18px;margin-bottom: 30px;color: #f1f1f1;}
    .hero button {
      background: #ff5a5f;
      color: #fff;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.3s, transform 0.3s;
    }
    .hero button:hover {
      background: #e14b4f;
      transform: scale(1.05);
    }
    footer {
      background: rgba(0, 0, 0, 0.8);
      color: #ccc;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><h2>Notiweb</h2></div>
    <nav>
      <a href="Index.html">Inicio</a>
      <a href="Blog.html">Blog</a>
      <a href="Noticia.html">Noticias</a>
    </nav>
  </header>

  <section class="hero">
    <img src="notiweb.jpg" alt="Noticias">
    <h1>Noticias y actualidad</h1>
    <p>Descubre las últimas noticias, artículos y análisis sobre el mundo actual.</p>
    <button onclick="window.location.href='Blog.html'">Leer más</button>
  </section>

  <footer>© 2025 Notiweb - Joseph, Angelica y Giovanny.</footer>

  <script>
    // Efecto de aparición en scroll
    const hero = document.querySelector('.hero');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) document.querySelector('header').classList.add('scrolled');
      else document.querySelector('header').classList.remove('scrolled');
      const heroPos = hero.getBoundingClientRect().top;
      const screenPos = window.innerHeight / 1.2;
      if (heroPos < screenPos) hero.classList.add('visible');
    });
    // Mostrar hero al cargar
    window.addEventListener('load', () => {
      hero.classList.add('visible');
    });
  </script>

</body>
</html>
